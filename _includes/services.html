<section id="services">
    <h2>Услуги</h2>
    <div class="services-grid">
      {% for service in site.data.services %}
      <div class="service-card">
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
        <small style="opacity: 0.7;">{{ service.details }}</small>
      </div>
      {% endfor %}
    </div>
</section>
